<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pro Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="counter-card">
        <h1>Counter</h1>
        <div id="value" class="counter-value">0</div>
        
        <div class="button-group">
            <button class="btn decrease" id="decrement">-</button>
            <button class="btn reset" id="reset">Reset</button>
            <button class="btn increase" id="increment">+</button>
        </div>

        
    </div>

    <script src="script.js"></script>
</body>
</html>
